apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - storageclass.yml
  - persistentVolume.yml
  - secrets.yml
  - db-service.yml
  - db-statefulset.yml
  - chat-deployment.yml
  - chat-service.yml
  - hpa.yml
  - ingress.yml

# CI bumps newTag (e.g. `kustomize edit set image werayco/chatdome=werayco/chatdome:<git-sha>`)
# and commits — ArgoCD then reconciles the cluster to the new tag.
images:
  - name: werayco/chatdome
    newTag: latest

commonAnnotations:
  env: development
  support-contact: werayco@gmail.com