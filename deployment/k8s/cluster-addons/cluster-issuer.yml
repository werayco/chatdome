# Let's Encrypt ClusterIssuer for cert-manager.
# Apply AFTER cert-manager is installed and running.
#
# HTTP-01 solver: cert-manager spins up a temporary pod + ingress route on
# port 80 to prove you control the domain. This requires:
#   * Your domain's A record already points at the cluster (ingress-nginx).
#   * Security group allows inbound 80 from 0.0.0.0/0.
#
# Replace the email before applying. Let's Encrypt uses it for expiry notices.
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: werayco@gmail.com          # <-- e.g. you@yourdomain.com
    privateKeySecretRef:
      name: letsencrypt-prod-account-key    # cert-manager stores the ACME account key here
    solvers:
      - http01:
          ingress:
            class: nginx
---
# Optional: a staging issuer for testing. Let's Encrypt PROD has strict rate
# limits (5 failures/hour/domain). Test with staging first by switching the
# ingress annotation to "letsencrypt-staging", confirm a cert is issued
# (it will be untrusted/fake), then switch back to "letsencrypt-prod".
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: werayco@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account-key
    solvers:
      - http01:
          ingress:
            class: traefik
