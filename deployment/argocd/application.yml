apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chatdome
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/werayco/chatdome.git
    targetRevision: main
    path: deployment/k8s

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true # this delete resources removed from git
      selfHeal: true # revert out-of-band changes back to git state
    syncOptions:
      - CreateNamespace=true
