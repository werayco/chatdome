apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: chatdome
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/werayco/chatdome.git
    targetRevision: main
    path: deployment/k8s/overlays/prod

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true 
    syncOptions:
      - CreateNamespace=true
