name: test

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write
  security-events: write

jobs:
  sast:
    name: Run Semgrep SAST
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/secrets
            p/owasp-top-ten

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - name: Checkout
        id: checkout-practice
        uses: actions/checkout@v4

      - name: Deploy App
        run: echo "Deploying application..."